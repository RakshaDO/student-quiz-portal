{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-5">
        <div class="card p-4 p-md-5 border-0">
            <div class="text-center mb-4">
                <div class="d-inline-flex justify-content-center align-items-center bg-primary bg-opacity-10 rounded-circle mb-3" style="width: 80px; height: 80px;">
                    <i class="fas fa-user-circle fa-3x text-primary"></i>
                </div>
                <h2 class="fw-bold text-dark">Welcome Back</h2>
                <p class="text-muted">Login to continue your learning journey</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-4">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0 bg-transparent"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" required autofocus placeholder="Enter your username">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0 bg-transparent"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" required placeholder="Enter your password">
                    </div>
                </div>

                <div class="d-grid gap-2 mb-4 mt-5">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                        Login securely
                    </button>
                </div>

                <div class="text-center mt-4">
                    <p class="text-muted mb-0">Don't have an account? <a href="{{ url_for('register') }}" class="text-primary text-decoration-none fw-bold">Register here</a></p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
