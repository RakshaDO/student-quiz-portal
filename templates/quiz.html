{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center mb-4 position-sticky" style="top: 85px; z-index: 1020;">
    <div class="col-md-10">
        <div class="card border-0 shadow-md bg-white">
            <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-center p-3 p-md-4">
                <div class="mb-3 mb-md-0 text-center text-md-start">
                    <h4 class="mb-1 fw-bold text-dark">{{ quiz.title }}</h4>
                    <span class="badge bg-primary bg-opacity-10 text-primary rounded-pill px-3 py-1">{{ quiz.category }}</span>
                </div>
                <div class="text-center text-md-end">
                    <span class="text-muted d-block mb-1 small fw-bold text-uppercase tracking-wide">Time Remaining</span>
                    <div id="timer-display" data-time="{{ quiz.time_limit_minutes * 60 }}" class="shadow-sm">
                        --:--
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-10">
        <form id="quiz-form" method="POST" action="{{ url_for('submit_quiz', quiz_id=quiz.id) }}">
            {% for q in questions %}
            <div class="card border-0 shadow-sm mb-4 question-card overflow-visible">
                <div class="card-header bg-transparent p-4 border-bottom-0 pb-2">
                    <h5 class="mb-0 fw-bold text-dark lh-base">
                        <span class="badge bg-primary rounded-circle p-2 me-2 shadow-sm" style="width: 35px; height: 35px; display: inline-flex; align-items: center; justify-content: center;">{{ loop.index }}</span> 
                        {{ q.question_text }}
                    </h5>
                </div>
                <div class="card-body p-4 pt-2">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <input type="radio" class="option-input" name="question_{{ q.id }}" id="q{{ q.id }}_a" value="A">
                            <label class="option-label" for="q{{ q.id }}_a">
                                <span class="fw-bold text-primary me-2">A.</span> {{ q.option_a }}
                            </label>
                        </div>
                        <div class="col-md-6">
                            <input type="radio" class="option-input" name="question_{{ q.id }}" id="q{{ q.id }}_b" value="B">
                            <label class="option-label" for="q{{ q.id }}_b">
                                <span class="fw-bold text-primary me-2">B.</span> {{ q.option_b }}
                            </label>
                        </div>
                        <div class="col-md-6">
                            <input type="radio" class="option-input" name="question_{{ q.id }}" id="q{{ q.id }}_c" value="C">
                            <label class="option-label" for="q{{ q.id }}_c">
                                <span class="fw-bold text-primary me-2">C.</span> {{ q.option_c }}
                            </label>
                        </div>
                        <div class="col-md-6">
                            <input type="radio" class="option-input" name="question_{{ q.id }}" id="q{{ q.id }}_d" value="D">
                            <label class="option-label" for="q{{ q.id }}_d">
                                <span class="fw-bold text-primary me-2">D.</span> {{ q.option_d }}
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
            
            <div class="text-end mt-4 mb-5 pb-5">
                <button type="submit" id="submit-btn" class="btn btn-primary btn-lg rounded-pill px-5 shadow-lg fw-bold">
                    <i class="fas fa-paper-plane me-2"></i> Submit Quiz
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const timerDisplay = document.getElementById('timer-display');
        if (timerDisplay) {
            let totalSeconds = parseInt(timerDisplay.getAttribute('data-time'));
            const quizForm = document.getElementById('quiz-form');
            
            function updateTimer() {
                const minutes = Math.floor(totalSeconds / 60);
                let seconds = totalSeconds % 60;
                
                if (seconds < 10) {
                    seconds = '0' + seconds;
                }
                
                timerDisplay.textContent = `${minutes}:${seconds}`;
                
                if (totalSeconds <= 60) {
                    timerDisplay.style.color = '#ef4444';
                }
                
                if (totalSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.textContent = "0:00";
                    alert('Time is up! Submitting your quiz automatically.');
                    quizForm.submit();
                }
                
                totalSeconds--;
            }
            
            updateTimer(); 
            const timerInterval = setInterval(updateTimer, 1000);
            
            function preventUnload(e) {
                e.preventDefault();
                e.returnValue = '';
            }
            
            window.addEventListener('beforeunload', preventUnload);
            
            quizForm.addEventListener('submit', function() {
                window.removeEventListener('beforeunload', preventUnload);
            });
        }
    });
</script>
{% endblock %}
